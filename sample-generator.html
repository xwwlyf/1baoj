function generateExcel(fileData) {
    const workbook = XLSX.utils.book_new();

    if (fileData.categories.length === 1) {
        // 单分类：放在同一Sheet，分类名作为标题行
        const cat = fileData.categories[0];
        const sheetData = [
            [cat.name],  // 分类名
            cat.headers,
            ...cat.rows
        ];
        const ws = XLSX.utils.aoa_to_sheet(sheetData);
        // 设置列宽
        ws['!cols'] = cat.headers.map(h => ({ wch: 14 }));
        XLSX.utils.book_append_sheet(workbook, ws, '报价');
    } else {
        // 多分类：每个分类一个Sheet
        fileData.categories.forEach((cat, idx) => {
            const sheetData = [
                [cat.name],
                cat.headers,
                ...cat.rows
            ];
            const sheetName = cat.name.substring(0, 31);
            const ws = XLSX.utils.aoa_to_sheet(sheetData);
            ws['!cols'] = cat.headers.map(h => ({ wch: 14 }));
            XLSX.utils.book_append_sheet(workbook, ws, sheetName);
        });
    }

    return workbook;
}

function downloadExcel(workbook, fileName) {
    const buffer = XLSX.write(workbook, { type: 'array', bookType: 'xlsx' });
    const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = fileName;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}

function generateAll() {
    const container = document.getElementById('generatedFiles');
    container.innerHTML = '<h4>✅ 已生成的文件：</h4>';

    TEST_DATA.forEach(data => {
        const workbook = generateExcel(data);
        downloadExcel(workbook, data.name);

        const totalRows = data.categories.reduce((sum, c) => sum + c.rows.length, 0);
        container.innerHTML += `
            <div class="file-item" style="margin-bottom:8px">
                <div class="file-info">
                    <div class="file-name">📁 ${data.name}</div>
                    <div class="file-meta">${data.categories.length} 个分类 · ${totalRows} 条记录</div>
                </div>
                <button class="btn btn-outline btn-sm" onclick='downloadAgain(${JSON.stringify(data)})'>📥 再次下载</button>
            </div>
        `;
    });

    container.innerHTML += '<p class="mt-16 text-secondary">💡 下载完成后，请前往 <a href="admin.html">管理后台</a> 上传这些文件进行测试。</p>';

    showToast(`已生成 ${TEST_DATA.length} 个测试文件`, 'success');
}

function downloadAgain(fileData) {
    const workbook = generateExcel(fileData);
    downloadExcel(workbook, fileData.name);
    showToast(`${fileData.name} 已下载`, 'success');
}

function showToast(message, type) {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.textContent = message;
    container.appendChild(toast);
    setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transition = 'opacity 0.3s';
        setTimeout(() => toast.remove(), 300);
    }, 3000);
}
